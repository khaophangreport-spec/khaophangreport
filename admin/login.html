<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="เข้าสู่ระบบเจ้าหน้าที่ Khaophang Report" />
    <title>เข้าสู่ระบบ | Khaophang Report Admin</title>
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/utilities.css" />
    <link rel="stylesheet" href="../assets/css/admin.css" />
    <script src="../assets/js/config.js" defer></script>
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
  </head>
  <body class="admin-login-page">
    <main class="admin-auth-shell">
      <section class="admin-auth-card" aria-labelledby="page-title">
        <a class="admin-brand" href="../index.html" aria-label="กลับหน้าแรก Khaophang Report">
          <span class="admin-logo" aria-hidden="true">KR</span>
          <span>Khaophang Report</span>
        </a>
        <p class="eyebrow">สำหรับเจ้าหน้าที่</p>
        <h1 id="page-title">เข้าสู่ระบบ</h1>
        <p class="placeholder-text">โครงสร้างตั้งต้น ยังไม่เปิดใช้งานการยืนยันตัวตนจริง</p>
        <form class="admin-login-form" aria-label="ฟอร์มเข้าสู่ระบบตัวอย่าง">
          <div class="form-field">
            <label class="form-label" for="admin-username">ชื่อผู้ใช้</label>
            <input class="form-control" id="admin-username" name="username" type="text" autocomplete="username" disabled />
          </div>
          <div class="form-field">
            <label class="form-label" for="admin-password">รหัสผ่าน</label>
            <input class="form-control" id="admin-password" name="password" type="password" autocomplete="current-password" disabled />
          </div>
          <button class="button button-primary" type="button" disabled>ยังไม่เชื่อมระบบเข้าสู่ระบบ</button>
        </form>
      </section>
    </main>
  </body>
</html>
